services:
  postgres:
    image: postgres:16
    container_name: subscription-db
    environment:
      POSTGRES_USER: huggooliveira
      POSTGRES_PASSWORD: Mv123456
      POSTGRES_DB: subscription_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huggooliveira -d subscription_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:

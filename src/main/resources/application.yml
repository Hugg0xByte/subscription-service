spring:
  application:
    name: subscription-service
  profiles:
    active: local
  cloud:
    gcp:
      sql:
        enabled: false

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/subscription_db
    username: huggooliveira
    password: Mv123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  cloud:
    gcp:
      project-id: local-project
      credentials:
        enabled: false
      pubsub:
        emulator-host: ${PUBSUB_EMULATOR_HOST:localhost:8085}
        project-id: local-project

pubsub:
  topic:
    pendente-pagamento: pendente-de-pagamento
    pagamento-processado: pagamento-processado
    pendente-pagamento-dlq: pendente-de-pagamento-dlq
    pagamento-processado-dlq: pagamento-processado-dlq
  subscription:
    pendente-pagamento: pendente-de-pagamento-sub
    pagamento-processado: pagamento-processado-sub

server:
  port: 8080

cache:
  subscription:
    ttl-minutes: 5
    max-size: 10000
  plan:
    ttl-minutes: 60
    max-size: 100

scheduler:
  renewal:
    cron: "0 0 * * * *"
    batch-size: 100

payment:
  mock:
    approve-percentage: 80
    reject-percentage: 15
    timeout-percentage: 5
    min-delay-ms: 100
    max-delay-ms: 500

resilience4j:
  circuitbreaker:
    instances:
      paymentGateway:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 100
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      paymentGateway:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        enable-exponential-backoff: true
        retry-exceptions:
          - java.lang.RuntimeException
          - java.util.concurrent.TimeoutException
  timelimiter:
    instances:
      paymentGateway:
        timeout-duration: 10s
        cancel-running-future: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus,circuitbreakers,retries
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    info:
      enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        subscription.usecase: true
        subscription.renewal: true
      percentiles:
        subscription.usecase: 0.5,0.95,0.99
        subscription.renewal: 0.5,0.95,0.99
  info:
    env:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/subscription_db_test
    username: huggooliveira
    password: Mv123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8081
